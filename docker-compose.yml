services:
  postgres:
    image: postgres:16-alpine
    container_name: project_management_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: project_management_v2
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_management_backend
    # Optional extra env file (gitignored), e.g. legacy SMTP-only file
    env_file:
      - path: smtp.local.env
        required: false
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgres://postgres:postgres123@postgres:5432/project_management_v2
      - PORT=3000
      - HOST=0.0.0.0
      - SHEET_ID=${SHEET_ID:-}
      - GID=${GID:-}
      - CR_GID=${CR_GID:-}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me-in-production}
      # Downstream Hub SSO (must match Hub; override with env SSO_TOKEN_SECRET if needed)
      - SSO_TOKEN_SECRET=${SSO_TOKEN_SECRET:-your-sso-shared-secret-change-in-production}
      - APP_PUBLIC_ORIGIN=${APP_PUBLIC_ORIGIN:-http://localhost:8080}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
      - ADMIN_NAME=${ADMIN_NAME:-Administrator}
    # Host port maps to container :3000 (nginx uses backend:3000 inside the network)
    ports:
      - "${BACKEND_HOST_PORT:-13000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount backend folder for live code updates during development
      - ./backend:/app/backend:ro
      # Mount docs folder for static assets (logo, etc)
      - ./docs:/app/docs:ro
      # Root .env file (optional; dotenv in container). Use a file, not a folder.
      - ./.env:/app/.env:ro
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project_management_frontend
    environment:
      # Set NGINX_ENV to: local, testing, or production
      - NGINX_ENV=${NGINX_ENV:-local}
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      # Mount frontend folder for live updates during development
      - ./frontend:/usr/share/nginx/html:ro
      # Mount all nginx configs for live updates
      - ./frontend/nginx.conf.local:/etc/nginx/conf.d/nginx.conf.local:ro
      - ./frontend/nginx.conf.testing:/etc/nginx/conf.d/nginx.conf.testing:ro
      - ./frontend/nginx.conf.production:/etc/nginx/conf.d/nginx.conf.production:ro
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge

