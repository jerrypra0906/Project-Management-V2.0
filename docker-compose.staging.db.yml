# AliCloud STAGING — Database server only (172.28.92.60)
# Usage:
#   docker compose -f docker-compose.staging.db.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: project_management_db_staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-project_management_v2}
    ports:
      - "${POSTGRES_HOST_PORT:-5440}:5432"
    volumes:
      - pm_staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pm_staging_postgres_data:
    driver: local
