services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project_management_frontend
    ports:
      - "1817:80"   # External port 1817 maps to container port 80
      # For standard HTTP port (80), change to: "80:80"
      - "18443:443" # HTTPS (change to "443:443" for standard HTTPS port)
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      # Use SSL nginx config (serves HTTPS on 443 and redirects HTTP->HTTPS)
      - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount provided certificates from repo assets into the container
      # Place cert files at: /opt/Project-Management-V2.0/assets/ssl on the server
      - ./assets/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

